<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>쿠팡 소싱 저장</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <div class="heading">
        <strong>쿠팡 소싱 저장</strong>
        <span id="status" class="status">대기</span>
      </div>
      <p id="detail">쿠팡 상품 페이지에서 저장하면 소싱탭으로 들어갑니다.</p>
      <div class="actions">
        <button id="capture" type="button">현재 상품 저장</button>
        <button id="open-saas" type="button" class="secondary">소싱탭 열기</button>
      </div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
