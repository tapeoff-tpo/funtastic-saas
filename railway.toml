# Shared Railway build configuration for services deployed from this repo.
#
# Two services are deployed from this repo:
#   web           — Next.js app (healthcheck set in Railway service config)
#   scrape-worker — marketplace RPA worker (no HTTP healthcheck)
#   worker        — BullMQ worker
#
# Redis plugin is added via Railway dashboard and REDIS_URL is auto-injected.

[build]
builder = "nixpacks"

[build.nixpacksPlan.phases.setup]
nixPkgs = ["nodejs_22"]

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
